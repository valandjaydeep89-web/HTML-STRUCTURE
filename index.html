<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaticShop</title>

<style>
:root {
    --primary: #0f172a;
    --accent: #38bdf8;
}

/* BACKGROUND */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3a8a, #0ea5e9);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(10px);
}

.navbar a {
    color: white;
    text-decoration: none;
    margin-left: 15px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 50px;
    animation: fadeIn 1s ease-in;
}

/* PRODUCTS */
.products {
    padding: 20px;
    text-align: center;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
}

/* GLASS CARD */
.card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 15px;
    transition: 0.3s;
    animation: fadeUp 0.8s ease;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
}

/* IMAGE */
.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 10px;
}

/* TEXT */
.price {
    font-weight: bold;
    margin: 10px 0;
}

/* BUTTON */
.btn {
    background: var(--accent);
    color: black;
    padding: 8px 15px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* FOOTER */
footer {
    text-align: center;
    padding: 15px;
    margin-top: 20px;
}

/* ANIMATIONS */
@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>SaticShop</h2>
    <div>
        <a href="#">Home</a>
        <a href="#products">Products</a>
        <a href="#">Cart</a>
    </div>
</div>

<!-- HERO -->
<div class="hero">
    <h1>Welcome to SaticShop</h1>
    <p>Modern Shopping Experience ✨</p>
</div>

<!-- PRODUCTS -->
<div class="products" id="products">
    <h2>Our Products</h2>

    <div class="grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500">
            <h3>Smart Watch</h3>
            <p class="price">₹2,499</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500">
            <h3>Red Shoes</h3>
            <p class="price">₹4,999</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=500">
            <h3>Gaming Laptop</h3>
            <p class="price">₹1,50,000</p>
            <button class="btn">Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=500">
            <h3>RGB Keyboard</h3>
            <p class="price">₹3,799</p>
            <button class="btn">Add to Cart</button>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 SaticShop</p>
</footer>

</body>
</html>
