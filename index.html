<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Components</title>

<style>
/* STYLE SYSTEM */
:root {
    --primary: black;
    --accent: #00f2fe;
    --bg: #f5f5f5;
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    margin: 0;
}

/* NAVBAR COMPONENT */
.navbar {
    background: var(--primary);
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
}

/* BUTTON COMPONENT */
.btn {
    background: var(--primary);
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: var(--accent);
}

/* PRODUCT CARD COMPONENT */
.product-card {
    background: white;
    padding: 15px;
    width: 220px;
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    text-align: center;
}

.product-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 8px;
}

.price {
    font-weight: bold;
    margin: 10px 0;
}

/* DEMO LAYOUT (just to show components) */
.container {
    display: flex;
    gap: 20px;
    padding: 20px;
    flex-wrap: wrap;
}
</style>

</head>

<body>

<!-- Navbar Component -->
<div class="navbar">
    <h2>SaticShop</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- Components Demo -->
<div class="container">

    <!-- Product Card 1 -->
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500">
        <h3>Headphones</h3>
        <p class="price">₹4,999</p>
        <button class="btn">Buy Now</button>
    </div>

    <!-- Product Card 2 -->
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500">
        <h3>Smart Watch</h3>
        <p class="price">₹2,499</p>
        <button class="btn">Buy Now</button>
    </div>

</div>

</body>
</html>
