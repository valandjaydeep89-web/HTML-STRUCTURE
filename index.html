<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaticShop Ultra</title>

<style>
:root {
    --primary: #0f172a;
    --accent: #22d3ee;
}

body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #0ea5e9);
    color: white;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    padding: 20px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(12px);
    border-radius: 12px;
    padding: 15px;
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-10px);
}

.card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
}

/* BUTTON */
.btn {
    margin: 5px;
    padding: 8px 12px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

.add { background: #22d3ee; }
.buy { background: #25D366; color: white; }

/* CART */
.cart-box {
    position: fixed;
    right: 10px;
    top: 70px;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 10px;
}

footer {
    text-align: center;
    padding: 20px;
}
</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>SaticShop</h2>
    <div>Cart (<span id="count">0</span>)</div>
</div>

<!-- PRODUCTS -->
<div class="grid">

    <!-- WATCH -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=500">
        <h3>Smart Watch</h3>
        <p>₹2499</p>
        <button class="btn add" onclick="addToCart('Smart Watch',2499)">Add</button>
        <button class="btn buy" onclick="buyNow()">📲 Order on WhatsApp</button>
    </div>

    <!-- SHOES -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?w=500">
        <h3>Red Shoes</h3>
        <p>₹4999</p>
        <button class="btn add" onclick="addToCart('Red Shoes',4999)">Add</button>
        <button class="btn buy" onclick="buyNow()">📲 Order on WhatsApp</button>
    </div>

    <!-- LAPTOP -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1603302576837-37561b2e2302?w=500">
        <h3>Gaming Laptop</h3>
        <p>₹150000</p>
        <button class="btn add" onclick="addToCart('Gaming Laptop',150000)">Add</button>
        <button class="btn buy" onclick="buyNow()">📲 Order on WhatsApp</button>
    </div>

    <!-- KEYBOARD -->
    <div class="card">
        <img src="https://images.unsplash.com/photo-1618384887929-16ec33fab9ef?w=500">
        <h3>RGB Keyboard</h3>
        <p>₹3799</p>
        <button class="btn add" onclick="addToCart('RGB Keyboard',3799)">Add</button>
        <button class="btn buy" onclick="buyNow()">📲 Order on WhatsApp</button>
    </div>

</div>

<!-- CART -->
<div class="cart-box">
    <p>Items: <span id="items">0</span></p>
    <p>Total: ₹<span id="total">0</span></p>
</div>

<!-- FOOTER -->
<footer>
    <p>📧 Email: 
        <a href="mailto:valandjaydeep89@gmail.com?subject=Product Inquiry" style="color:#22d3ee;">
            valandjaydeep89@gmail.com
        </a>
    </p>

    <p>
        📲 WhatsApp: 
        <a href="https://wa.me/919016678466" style="color:#22d3ee;">
            9016678466
        </a>
    </p>
</footer>

<script>
let count = 0;
let total = 0;
let cartItems = [];

function addToCart(name, price){
    count++;
    total += price;
    cartItems.push(name + " - ₹" + price);

    document.getElementById("count").innerText = count;
    document.getElementById("items").innerText = count;
    document.getElementById("total").innerText = total;
}

function buyNow(){
    if(cartItems.length === 0){
        alert("Cart is empty!");
        return;
    }

    let msg = "Hello, I want to order:\n\n";
    cartItems.forEach(item => {
        msg += item + "\n";
    });

    msg += "\nTotal: ₹" + total;

    window.open(`https://wa.me/919016678466?text=${encodeURIComponent(msg)}`);
}
</script>

</body>
</html>
