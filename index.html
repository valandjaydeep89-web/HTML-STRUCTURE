<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UI Components</title>

<style>
/* STYLE SYSTEM */
:root {
    --primary: #1a1a1a;
    --accent: #00c6ff;
    --bg: #f4f7fb;
}

body {
    font-family: Arial, sans-serif;
    background: var(--bg);
    margin: 0;
}

/* NAVBAR */
.navbar {
    background: var(--primary);
    color: white;
    padding: 15px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.navbar a {
    color: white;
    text-decoration: none;
    margin: 0 10px;
    position: relative;
}

/* underline animation */
.navbar a::after {
    content: "";
    position: absolute;
    width: 0%;
    height: 2px;
    background: var(--accent);
    left: 0;
    bottom: -3px;
    transition: 0.3s;
}

.navbar a:hover::after {
    width: 100%;
}

/* BUTTON */
.btn {
    background: var(--primary);
    color: white;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    transition: 0.3s;
}

.btn:hover {
    background: var(--accent);
    transform: scale(1.05);
}

/* PRODUCT CARD */
.product-card {
    background: white;
    padding: 15px;
    width: 220px;
    border-radius: 12px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
    transition: 0.3s;
}

/* card hover animation */
.product-card:hover {
    transform: translateY(-10px);
}

/* image zoom effect */
.product-card img {
    width: 100%;
    height: 180px;
    object-fit: cover;
    border-radius: 8px;
    transition: 0.3s;
}

.product-card:hover img {
    transform: scale(1.05);
}

.price {
    font-weight: bold;
    margin: 10px 0;
    color: var(--primary);
}

/* container */
.container {
    display: flex;
    gap: 20px;
    padding: 20px;
    flex-wrap: wrap;
    justify-content: center;
}
</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <h2>SaticShop</h2>
    <div>
        <a href="#">Home</a>
        <a href="#">Products</a>
        <a href="#">Contact</a>
    </div>
</div>

<!-- Components -->
<div class="container">

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500">
        <h3>Headphones</h3>
        <p class="price">₹4,999</p>
        <button class="btn">Buy Now</button>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500">
        <h3>Smart Watch</h3>
        <p class="price">₹2,499</p>
        <button class="btn">Buy Now</button>
    </div>

</div>

</body>
</html>
